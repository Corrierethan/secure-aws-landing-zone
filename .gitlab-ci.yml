# DevSecOps pipeline for the Secure AWS Landing Zone.
# Stages run on every merge request. The pipeline fails on formatting drift,
# invalid Terraform, lint errors, or HIGH/CRITICAL security findings.

stages:
  - validate
  - security
  - plan

variables:
  TF_VERSION: "1.6.6"
  # Directories that contain a root Terraform configuration to plan.
  TF_ROOT_DIRS: "environments/management environments/nonprod"

default:
  image: hashicorp/terraform:${TF_VERSION}
  before_script:
    - terraform --version

# ---------------------------------------------------------------------------
# validate stage
# ---------------------------------------------------------------------------
fmt:
  stage: validate
  script:
    - terraform fmt -check -recursive -diff
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

validate:
  stage: validate
  script:
    - |
      for dir in modules/* environments/*; do
        if [ -f "$dir/main.tf" ] || ls "$dir"/*.tf >/dev/null 2>&1; then
          echo "== validating $dir =="
          terraform -chdir="$dir" init -backend=false
          terraform -chdir="$dir" validate
        fi
      done
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

tflint:
  stage: validate
  image:
    name: ghcr.io/terraform-linters/tflint:latest
    entrypoint: [""]
  before_script:
    - tflint --version
    - tflint --init
  script:
    - tflint --recursive --config="$CI_PROJECT_DIR/.tflint.hcl"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# security stage
# ---------------------------------------------------------------------------
tfsec:
  stage: security
  image:
    name: aquasec/tfsec:latest
    entrypoint: [""]
  script:
    - tfsec . --minimum-severity HIGH --no-color
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

checkov:
  stage: security
  image:
    name: bridgecrew/checkov:latest
    entrypoint: [""]
  script:
    - checkov -d . --quiet --compact --framework terraform
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# plan stage
# ---------------------------------------------------------------------------
plan:
  stage: plan
  script:
    - |
      for dir in $TF_ROOT_DIRS; do
        echo "== terraform plan: $dir =="
        terraform -chdir="$dir" init -backend=false
        terraform -chdir="$dir" plan -input=false -lock=false -out=tfplan || true
      done
  artifacts:
    paths:
      - "**/tfplan"
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
